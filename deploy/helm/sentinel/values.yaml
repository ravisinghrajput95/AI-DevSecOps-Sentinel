# =========================================================
# AI DevSecOps Sentinel — chart values
#
# Secrets are NEVER set here. Create them out-of-band once:
#   kubectl create secret generic sentinel-secrets \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=SENTINEL_API_KEY=...
# Optional: add SENTRY_DSN to that same secret to enable error
# tracking — envFrom loads it automatically, no chart change needed.
# =========================================================

imageRegistry: us-central1-docker.pkg.dev/project-0c628a24-2e5e-4878-861/sentinel

# Prometheus metrics are always exposed on /metrics (pod port, not
# ingress). The PodMonitor wires them into a Prometheus Operator.
metrics:
  podMonitor:
    enabled: false # set true when the Prometheus Operator is installed
    interval: 30s

backend:
  image:
    name: sentinel-backend
    tag: latest # CI overrides with the commit SHA
  # Name of the pre-created Secret; all its keys become env vars
  existingSecret: sentinel-secrets
  env:
    llmModel: gpt-4o
    maxRequestMb: "80"
    rateLimitPerMin: "20"
    logLevel: INFO
    logFormat: json # structured JSON logs for Cloud Logging; "text" for humans
  # Scanners (checkov, semgrep, trivy) are the heavy part
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  # PVC for trivy's CVE DB + semgrep rules — without it every
  # pod restart pays the first-scan download again
  cache:
    enabled: true
    size: 5Gi

frontend:
  image:
    name: sentinel-frontend
    tag: latest # CI overrides with the commit SHA
  replicas: 1
  service:
    # LoadBalancer = public IP without needing a domain.
    # Switch to ClusterIP when fronting with the Ingress below.
    type: LoadBalancer
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi
  proxy:
    # Must exceed the backend's SENTINEL_MAX_REQUEST_MB
    clientMaxBodySize: 100m
    # Repo ingestion + scanners + LLM can take minutes
    readTimeout: 300s

# HTTPS entrypoint via an ingress-nginx controller + cert-manager.
# When enabling, ALSO set frontend.service.type=ClusterIP (the
# ingress becomes the public entrypoint; the frontend Service no
# longer needs its own LoadBalancer). The host is derived from the
# ingress controller's external IP, e.g. <ip>.sslip.io (no domain
# purchase required — sslip.io resolves <ip>.sslip.io -> <ip>).
ingress:
  enabled: false
  className: nginx
  host: "" # e.g. 34-120-0-1.sslip.io
  annotations: {}
  tls:
    enabled: true
    # cert-manager ClusterIssuer that fulfills the certificate
    # (see deploy/cert-manager/cluster-issuer.yaml)
    clusterIssuer: letsencrypt-prod
    secretName: sentinel-tls
