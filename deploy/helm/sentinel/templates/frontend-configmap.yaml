# Overrides the nginx.conf baked into the image (which targets
# the docker-compose service name `backend`) with one aimed at
# this release's backend Service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel.fullname" . }}-nginx
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        client_max_body_size {{ .Values.frontend.proxy.clientMaxBodySize }};

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }

        location ~ ^/(chat|health|remove-file|scan-status/.+)$ {
            proxy_pass http://{{ include "sentinel.fullname" . }}-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout {{ .Values.frontend.proxy.readTimeout }};
            proxy_send_timeout {{ .Values.frontend.proxy.readTimeout }};
        }
    }
