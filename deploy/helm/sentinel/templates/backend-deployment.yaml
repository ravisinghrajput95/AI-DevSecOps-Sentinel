apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-backend
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  # HARD CONSTRAINT — not tunable via values: sessions, file
  # memory, and the FAISS index live in-process. Two replicas
  # would split user sessions; Recreate (not RollingUpdate)
  # because even a brief two-pod overlap does the same.
  # Externalize state (Redis + vector store) before scaling.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "sentinel.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        # Numeric UID matching the image's `sentinel` user —
        # runAsNonRoot cannot verify a named USER. fsGroup makes
        # the scanner-cache PVC writable by that user.
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: "{{ .Values.imageRegistry }}/{{ .Values.backend.image.name }}:{{ .Values.backend.image.tag }}"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ .Values.backend.existingSecret }}
          env:
            - name: SENTINEL_LLM_MODEL
              value: {{ .Values.backend.env.llmModel | quote }}
            - name: SENTINEL_MAX_REQUEST_MB
              value: {{ .Values.backend.env.maxRequestMb | quote }}
            - name: SENTINEL_RATE_LIMIT_PER_MIN
              value: {{ .Values.backend.env.rateLimitPerMin | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.backend.env.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.backend.env.logFormat | quote }}
            # Trusted reverse-proxy hops for client-IP extraction:
            # 1 = just the SPA nginx (LoadBalancer path); 2 = ingress-
            # nginx + SPA nginx (TLS path). Wrong value → rate limit
            # keys on a proxy IP instead of the real client.
            - name: SENTINEL_TRUSTED_PROXY_HOPS
              value: {{ if .Values.ingress.enabled }}"2"{{ else }}"1"{{ end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          # Blocking work runs on worker threads so /health stays
          # responsive during scans, but keep the probes tolerant as
          # defense-in-depth: a slow health check must not evict the pod
          # from the Service (readiness) or SIGKILL it (liveness).
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            # ~5 min of continuous failure before a restart
            failureThreshold: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          {{- if .Values.backend.cache.enabled }}
          volumeMounts:
            - name: scanner-cache
              mountPath: /home/sentinel/.cache
          {{- end }}
      {{- if .Values.backend.cache.enabled }}
      volumes:
        - name: scanner-cache
          persistentVolumeClaim:
            claimName: {{ include "sentinel.fullname" . }}-scanner-cache
      {{- end }}
