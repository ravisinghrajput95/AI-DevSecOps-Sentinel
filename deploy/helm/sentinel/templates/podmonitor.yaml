{{- /* nil-safe: a --reuse-values upgrade whose stored values predate
       the metrics key must not nil-pointer here */ -}}
{{- $pm := (.Values.metrics | default dict).podMonitor | default dict }}
{{- if $pm.enabled }}
# Prometheus Operator PodMonitor — scrapes the backend pod's
# :8000/metrics directly (not through the ingress). Requires the
# Prometheus Operator CRDs to be installed in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "sentinel.fullname" . }}-backend
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: {{ $pm.interval | default "30s" }}
{{- end }}
