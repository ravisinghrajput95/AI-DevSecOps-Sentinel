{{- if .Values.ingress.enabled }}
{{- /* default to an empty dict so a --reuse-values upgrade whose
       stored values predate the tls key can't nil-pointer here */ -}}
{{- $tls := .Values.ingress.tls | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sentinel.fullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
  annotations:
    # Uploads arrive base64 in the JSON body; the ingress-nginx default
    # (1 MB) 413s anything larger BEFORE it reaches the backend. Keep
    # this above the backend's SENTINEL_MAX_REQUEST_MB.
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.proxyBodySize | default "100m" | quote }}
    # Repo ingest + full scan can take minutes; default 60s -> 504.
    nginx.ingress.kubernetes.io/proxy-read-timeout: {{ .Values.ingress.proxyTimeout | default "300" | quote }}
    nginx.ingress.kubernetes.io/proxy-send-timeout: {{ .Values.ingress.proxyTimeout | default "300" | quote }}
    {{- if $tls.enabled }}
    # cert-manager watches this and issues/renews the cert into
    # the tls secretName below via the named ClusterIssuer.
    cert-manager.io/cluster-issuer: {{ $tls.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if $tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ $tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sentinel.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
