# =========================================================
# FRONTEND CI — lint + production build first, then (push to
# main only) the docker image build + smoke test as a
# dependent job. Path-filtered: backend-only or docs-only
# changes never run it.
#
# GKE deploy (later): add Artifact Registry auth + push
# after the smoke test, then a rollout step.
# =========================================================

name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR: us-central1-docker.pkg.dev/project-0c628a24-2e5e-4878-861/sentinel
  WIF_PROVIDER: projects/861082766890/locations/global/workloadIdentityPools/github-pool/providers/github
  GCP_SA: github-actions-sa@project-0c628a24-2e5e-4878-861.iam.gserviceaccount.com

jobs:
  # =========================================================
  # TESTS — lint (zero tolerance) + production build
  # =========================================================
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Build
        run: npm run build

  # =========================================================
  # DOCKER IMAGE — only after tests pass, only on main pushes
  # =========================================================
  docker:
    runs-on: ubuntu-latest
    needs: tests
    # Runs on main pushes and manual dispatches — skipped only on
    # PRs, where tests alone gate the merge
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write # OIDC token for Workload Identity Federation
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build image
        run: |
          # The API key is baked into the JS bundle; it must match
          # the SENTINEL_API_KEY in the cluster's sentinel-secrets
          docker build \
            frontend \
            --build-arg VITE_SENTINEL_API_KEY="${{ secrets.VITE_SENTINEL_API_KEY }}" \
            -t sentinel-frontend:${{ github.sha }}

      - name: Smoke test — nginx boots and the SPA serves
        run: |
          # nginx resolves the `backend` upstream at startup and
          # exits if it doesn't exist — point it at localhost so
          # the container boots standalone. API paths aren't
          # testable here (no backend); Backend CI covers those.
          docker run -d --name frontend -p 8080:80 \
            --add-host backend:127.0.0.1 \
            sentinel-frontend:${{ github.sha }}

          for i in $(seq 1 6); do
            curl -fsS -o index.html http://localhost:8080/ 2>/dev/null && break
            sleep 2
          done
          grep -qi "<title" index.html

      - name: Show logs on failure
        if: failure()
        run: docker logs frontend 2>&1 | tail -50

      - name: Authenticate to Google Cloud (OIDC, keyless)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - name: Push to Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker tag sentinel-frontend:${{ github.sha }} "$GAR/sentinel-frontend:${{ github.sha }}"
          docker push "$GAR/sentinel-frontend:${{ github.sha }}"

  # =========================================================
  # DEPLOY — helm upgrade setting only THIS component's tag;
  # --reuse-values keeps the other component's deployed tag.
  # Gates on the frontend rollout only.
  # =========================================================
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to Google Cloud (OIDC, keyless)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: sentinel
          location: us-central1

      - name: Deploy frontend via helm
        run: |
          # Retry: the two CI lanes can deploy concurrently and
          # helm allows one operation per release at a time
          for attempt in 1 2 3; do
            helm upgrade --install sentinel deploy/helm/sentinel \
              --reuse-values \
              --set frontend.image.tag=${{ github.sha }} \
              && break
            echo "helm release busy — retry $attempt"
            sleep 30
          done
          kubectl rollout status deployment/sentinel-frontend --timeout=10m

      - name: Show pods on failure
        if: failure()
        run: kubectl get pods -o wide && kubectl describe deployment sentinel-frontend | tail -20
