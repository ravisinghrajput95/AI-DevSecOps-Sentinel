# =========================================================
# FRONTEND CI — lint + production build first, then (push to
# main only) the docker image build + smoke test as a
# dependent job. Path-filtered: backend-only or docs-only
# changes never run it.
#
# GKE deploy (later): add Artifact Registry auth + push
# after the smoke test, then a rollout step.
# =========================================================

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # TESTS — lint (zero tolerance) + production build
  # =========================================================
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Build
        run: npm run build

  # =========================================================
  # DOCKER IMAGE — only after tests pass, only on main pushes
  # =========================================================
  docker:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build image
        run: |
          docker build \
            frontend \
            -t sentinel-frontend:${{ github.sha }}

      - name: Smoke test — nginx boots and the SPA serves
        run: |
          # nginx resolves the `backend` upstream at startup and
          # exits if it doesn't exist — point it at localhost so
          # the container boots standalone. API paths aren't
          # testable here (no backend); Backend CI covers those.
          docker run -d --name frontend -p 8080:80 \
            --add-host backend:127.0.0.1 \
            sentinel-frontend:${{ github.sha }}

          for i in $(seq 1 6); do
            curl -fsS -o index.html http://localhost:8080/ 2>/dev/null && break
            sleep 2
          done
          grep -qi "<title" index.html

      - name: Show logs on failure
        if: failure()
        run: docker logs frontend 2>&1 | tail -50
