# =========================================================
# SECRET SELF-SCAN — a DevSecOps tool should pass its own
# medicine: gitleaks over the full git history (fixtures
# allowlisted in .gitleaks.toml).
#
# Deliberately standalone with NO path filter: it must run
# on every push, because a leaked secret can arrive in any
# file — path-filtering it under one stack's CI would leave
# gaps.
# =========================================================

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" gitleaks

      - name: Scan repository history for secrets
        run: gitleaks detect --redact --verbose
