# =========================================================
# BACKEND IMAGE — runs only after the CI workflow (tests +
# self-scan) succeeds on main, and builds the exact commit
# CI tested. Boots the image and asserts the full scanner
# registry is intact.
#
# GKE deploy (later): add auth + push to Artifact Registry
# after the smoke test, then a rollout step.
# =========================================================

name: Docker Backend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: docker-backend-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Build what CI tested, not whatever main points at now
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t sentinel-backend:${{ github.event.workflow_run.head_sha }} \
            .

      - name: Smoke test — boot and verify scanner registry
        run: |
          docker run -d --name backend -p 8000:8000 \
            -e OPENAI_API_KEY=sk-ci-dummy-key \
            sentinel-backend:${{ github.event.workflow_run.head_sha }}

          for i in $(seq 1 12); do
            curl -fsS http://localhost:8000/health > health.json && break
            sleep 5
          done

          python3 -c "
          import json
          h = json.load(open('health.json'))
          assert h['status'] == 'ok'
          missing = [t for t, ok in h['scanners'].items() if not ok]
          assert not missing, f'scanners missing in image: {missing}'
          "

      - name: Show logs on failure
        if: failure()
        run: docker logs backend 2>&1 | tail -50
