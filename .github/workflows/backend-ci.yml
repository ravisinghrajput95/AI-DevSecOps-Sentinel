# =========================================================
# BACKEND CI — tests first, then (push to main only) the
# docker image build + smoke test as a dependent job. Path-
# filtered: frontend-only or docs-only changes never run it.
#
# GKE deploy (later): add Artifact Registry auth + push
# after the smoke test, then a rollout step.
# =========================================================

name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "evals/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/**"
      - ".trivyignore.yaml"
      - "deploy/helm/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "evals/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/**"
      - ".trivyignore.yaml"
      - "deploy/helm/**"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR: us-central1-docker.pkg.dev/project-0c628a24-2e5e-4878-861/sentinel
  WIF_PROVIDER: projects/861082766890/locations/global/workloadIdentityPools/github-pool/providers/github
  GCP_SA: github-actions-sa@project-0c628a24-2e5e-4878-861.iam.gserviceaccount.com

jobs:
  # =========================================================
  # TESTS — full suite with all six scanners installed so the
  # integration tests run instead of being skipped
  # =========================================================
  tests:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: sk-ci-dummy-key
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install security scanners
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          pip install checkov semgrep

          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" gitleaks

          curl -sSfL -o "$HOME/.local/bin/hadolint" \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x "$HOME/.local/bin/hadolint"

          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_Linux-64bit.tar.gz \
            | tar -xz -C "$HOME/.local/bin" trivy

          curl -sSfL https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" kubesec

      - name: Verify all scanners are available
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from backend.scanners import scanner_status
          status = scanner_status()
          print(status)
          missing = [t for t, ok in status.items() if not ok]
          assert not missing, f'scanners missing in CI: {missing}'
          "

      - name: Run test suite
        run: python -m pytest tests/ -v

  # =========================================================
  # DOCKER IMAGE — only after tests pass, only on main pushes
  # =========================================================
  docker:
    runs-on: ubuntu-latest
    needs: tests
    # Runs on main pushes and manual dispatches — skipped only on
    # PRs, where tests alone gate the merge
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write # OIDC token for Workload Identity Federation
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t sentinel-backend:${{ github.sha }} \
            .

      - name: Smoke test — boot and verify scanner registry
        run: |
          docker run -d --name backend -p 8000:8000 \
            -e OPENAI_API_KEY=sk-ci-dummy-key \
            sentinel-backend:${{ github.sha }}

          # Poll quietly while uvicorn boots — failed attempts here
          # are expected retry noise, not errors worth logging
          for i in $(seq 1 12); do
            curl -fsS http://localhost:8000/health > health.json 2>/dev/null && break
            sleep 5
          done

          python3 -c "
          import json
          h = json.load(open('health.json'))
          assert h['status'] == 'ok'
          missing = [t for t, ok in h['scanners'].items() if not ok]
          assert not missing, f'scanners missing in image: {missing}'
          "

      - name: Show logs on failure
        if: failure()
        run: docker logs backend 2>&1 | tail -50

      - name: Authenticate to Google Cloud (OIDC, keyless)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - name: Push to Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker tag sentinel-backend:${{ github.sha }} "$GAR/sentinel-backend:${{ github.sha }}"
          docker push "$GAR/sentinel-backend:${{ github.sha }}"

      - name: Supply chain — SBOM, scan, sign
        uses: ./.github/actions/supply-chain
        with:
          image: ${{ env.GAR }}/sentinel-backend:${{ github.sha }}

  # =========================================================
  # DEPLOY — helm upgrade setting only THIS component's tag;
  # --reuse-values keeps the other component's deployed tag.
  # Gates on the backend rollout only, so a not-yet-deployed
  # frontend never blocks this lane.
  # =========================================================
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to Google Cloud (OIDC, keyless)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA }}

      - uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: sentinel
          location: us-central1

      - name: Deploy backend via helm
        run: |
          # Retry: the two CI lanes can deploy concurrently and
          # helm allows one operation per release at a time
          for attempt in 1 2 3; do
            helm upgrade --install sentinel deploy/helm/sentinel \
              --reuse-values \
              --set backend.image.tag=${{ github.sha }} \
              && break
            echo "helm release busy — retry $attempt"
            sleep 30
          done
          kubectl rollout status deployment/sentinel-backend --timeout=10m

      - name: Show pods on failure
        if: failure()
        run: kubectl get pods -o wide && kubectl describe deployment sentinel-backend | tail -20
