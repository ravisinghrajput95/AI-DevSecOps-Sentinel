# =========================================================
# AI OUTPUT EVALUATION — the LLM-quality gate.
#
# The scorers are unit-tested for free in Backend CI
# (tests/test_ai_eval.py). This workflow runs the LIVE
# harness: real scanners + a real LLM call, scored against
# grounding / coverage / no-fabrication / redaction /
# injection-resistance / format thresholds.
#
# It needs a real OPENAI_API_KEY repo secret (it spends a
# small amount of credit), so it is manual by default. Add
# the secret and uncomment the schedule to run it weekly.
# =========================================================

name: AI Eval

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 7 * * 1"   # weekly, Mondays 07:00 UTC

concurrency:
  group: ai-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-eval:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Fail early if no API key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set — the live AI eval needs it."
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install security scanners
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          pip install checkov semgrep
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" gitleaks
          curl -sSfL -o "$HOME/.local/bin/hadolint" \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x "$HOME/.local/bin/hadolint"
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_Linux-64bit.tar.gz \
            | tar -xz -C "$HOME/.local/bin" trivy
          curl -sSfL https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" kubesec

      - name: Run live AI evaluation
        run: python -m evals.ai_eval
