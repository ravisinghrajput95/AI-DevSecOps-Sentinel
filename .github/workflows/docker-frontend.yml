# =========================================================
# FRONTEND IMAGE — runs only after the CI workflow (tests +
# self-scan) succeeds on main, and builds the exact commit
# CI tested. Boots the image and checks the SPA serves.
#
# GKE deploy (later): add auth + push to Artifact Registry
# after the smoke test, then a rollout step.
# =========================================================

name: Docker Frontend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: docker-frontend-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Build what CI tested, not whatever main points at now
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build image
        run: |
          docker build \
            frontend \
            -t sentinel-frontend:${{ github.event.workflow_run.head_sha }}

      - name: Smoke test — nginx boots and the SPA serves
        run: |
          # nginx resolves the `backend` upstream at startup and
          # exits if it doesn't exist — point it at localhost so
          # the container boots standalone. API paths aren't
          # testable here (no backend); CI's backend-tests and the
          # backend image workflow cover those.
          docker run -d --name frontend -p 8080:80 \
            --add-host backend:127.0.0.1 \
            sentinel-frontend:${{ github.event.workflow_run.head_sha }}

          for i in $(seq 1 6); do
            curl -fsS -o index.html http://localhost:8080/ && break
            sleep 2
          done
          grep -qi "<title" index.html

      - name: Show logs on failure
        if: failure()
        run: docker logs frontend 2>&1 | tail -50
