# =========================================================
# nginx — serves the built SPA and proxies API paths to the
# backend container. TLS is expected to terminate in front
# of this (cloud load balancer, or add a 443 server block
# with certbot-managed certs on a bare VM).
# =========================================================

server {
    listen 80;
    server_name _;

    # Must exceed the backend's SENTINEL_MAX_REQUEST_MB (80)
    # so oversized uploads get the backend's JSON 413, not an
    # nginx HTML error page.
    client_max_body_size 100m;

    # ---- SPA ---------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # ---- API ---------------------------------------------
    # Same three paths the Vite dev server proxies.
    location ~ ^/(chat|health|remove-file)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Repo ingestion + full scanner run + LLM call can
        # legitimately take minutes on large uploads.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
